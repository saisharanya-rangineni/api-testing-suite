name: API Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Run every Monday at 6 AM UTC
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create reports directory
        run: mkdir -p reports

      - name: Create environment file
        run: |
          cp environments/reqres-env.postman_environment.example.json environments/reqres-env.postman_environment.json
          sed -i 's/YOUR_REQRES_API_KEY_HERE/${{ secrets.REQRES_API_KEY }}/' environments/reqres-env.postman_environment.json

      - name: Run Newman tests
        run: npm test

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: reports/api-test-report.html
          retention-days: 30

      - name: Upload JSON Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: reports/api-test-results.json
          retention-days: 30
